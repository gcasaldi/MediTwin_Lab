name: Ingest Public APIs

"on":
  schedule:
    - cron: "15 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run ingestion
        run: python scripts/ingest_apis.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ingestion docs/data/live
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "chore(data): update API ingestion snapshots"
            git push
          fi
